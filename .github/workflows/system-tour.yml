name: Record Gamma Full Install + Tour 🎥♾️
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'التاق تاع الريليز الحالي'
        required: true
        default: 'v2.1-Royal'
      store_deb_name:
        description: 'اسم ملف .deb تاع الستور'
        required: true
        default: 'gamma-store_2.2.0_all.deb'

permissions:
  contents: write

jobs:
  record-all:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        iso: [gamma-legacy-32, gamma-lite-ghost, gamma-pro-maxmini]
    steps:
      - name: Install QEMU + FFmpeg + Xvfb + xdotool
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils ffmpeg xvfb xdotool wmctrl

      - name: Download ISO ${{ matrix.iso }}
        run: |
          wget -O gamma.iso "https://github.com/takismartgamer123-rgb/Gamma-linux/releases/download/${{ github.event.inputs.release_tag }}/${{ matrix.iso }}.iso"
          ls -lh gamma.iso

      - name: Record Full Install Demo - 3min
        run: |
          qemu-img create -f qcow2 disk.qcow2 15G
          
          # 1. شاشة وهمية
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 3
          
          # 2. شغل QEMU Live
          qemu-system-x86_64 \
            -m 3072 \
            -smp 2 \
            -cdrom gamma.iso \
            -drive file=disk.qcow2,format=qcow2 \
            -boot d \
            -vga std \
            -vnc :1 \
            -netdev user,id=net0 -device e1000,netdev=net0 \
            -usb -device usb-tablet &
          QEMU_PID=$!
          sleep 90 # إقلاع كامل + سطح المكتب
          
          # 3. ابدا التسجيل
          ffmpeg -f x11grab -video_size 1280x720 -i :99 -codec:v libx264 -preset ultrafast -t 180 ${{ matrix.iso }}-full-demo.mp4 &
          FFMPEG_PID=$!
          
          # 4. السيناريو الكامل 3 دقايق
          sleep 5
          
          # 0:00-0:10 افتح ترمينال
          xdotool key ctrl+alt+t
          sleep 3
          xdotool type "clear"
          xdotool key Return
          sleep 1
          xdotool type "echo '=== Gamma Linux ${{ matrix.iso }} ==='"
          xdotool key Return
          sleep 1
          xdotool type "echo 'Dedicated to my father Fateh'"
          xdotool key Return
          sleep 3
          
          # 0:10-1:00 حمل وثبت الستور من الترمينال
          xdotool type "wget https://github.com/takismartgamer123-rgb/Gamma-linux/releases/download/${{ github.event.inputs.release_tag }}/${{ github.event.inputs.store_deb_name }}"
          xdotool key Return
          sleep 15 # وقت التحميل
          
          xdotool type "ls -lh ${{ github.event.inputs.store_deb_name }}"
          xdotool key Return
          sleep 3
          
          xdotool type "sudo apt-get install -y ./{{ github.event.inputs.store_deb_name }}"
          xdotool key Return
          sleep 20 # وقت التثبيت
          
          xdotool type "echo '=== Store Installed Successfully ==='"
          xdotool key Return
          sleep 3
          
          # 1:00-1:20 شغل الستور من الترمينال
          xdotool type "gamma-store"
          xdotool key Return
          sleep 10 # وقت فتح الستور
          
          # 1:20-2:00 استعمل الستور: بحث
          xdotool key Tab
          sleep 1
          xdotool key Return # زر Search
          sleep 2
          xdotool type "firefox"
          sleep 1
          xdotool key Return
          sleep 15 # نتائج البحث + الكاش
          
          # 2:00-2:20 اختار وثبت
          xdotool key Tab
          sleep 1
          xdotool key space # اختار أول نتيجة
          sleep 1
          xdotool key Tab
          sleep 1
          xdotool key Tab
          sleep 1
          xdotool key Return # Install
          sleep 15 # شريط التقدم
          
          # 2:20-2:40 اقفل الستور وروح للترمينال
          xdotool key Alt+F4
          sleep 2
          xdotool key Alt+Tab
          sleep 2
          
          # 2:40-3:00 النهاية
          xdotool type "clear"
          xdotool key Return
          sleep 1
          xdotool type "echo 'Alpha failed. Beta crashed. Gamma survives'"
          xdotool key Return
          sleep 2
          xdotool type "echo 'Maximum Power, Minimum RAM'"
          xdotool key Return
          sleep 2
          xdotool type "echo 'Dedicated to my father Fateh'"
          xdotool key Return
          sleep 8
          
          wait $FFMPEG_PID
          kill $QEMU_PID || true
          ls -lh ${{ matrix.iso }}-full-demo.mp4

      - name: Upload Video to Release ${{ github.event.inputs.release_tag }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: ${{ matrix.iso }}-full-demo.mp4
          body: |
            ## 🎥 Gamma Linux Full Demo - ${{ matrix.iso }}
            
            **3-minute complete walkthrough:**
            1. Boot Live ISO
            2. **Terminal: wget + apt install Gamma Store**
            3. **Launch gamma-store from terminal**
            4. **Search + Install firefox from store**
            5. Outro
            
            *Alpha failed. Beta crashed. Gamma survives.*  
            *Dedicated to my father Fateh* 🇩🇿
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
