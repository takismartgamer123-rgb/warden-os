name: Capture All Gamma Linux v2.3.0 Editions

on:
  workflow_dispatch: # تشغيل يدوي بضغطة زر

jobs:
  screenshot-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        edition: [legacy32, lite-ghost, pro-maxmini]
        include:
          - edition: legacy32 
            iso_url: "https://github.com/takismartgamer123-rgb/Gamma-linux/releases/download/v2.3.0-FINAL/gamma-legacy32.iso" # ضع الرابط الحقيقي هنا
            display_name: "Legacy 32-bit"
          - edition: lite-ghost 
            iso_url: "https://github.com/takismartgamer123-rgb/Gamma-linux/releases/download/v2.3.0-FINAL/gamma-lite-ghost.iso" # ضع الرابط الحقيقي هنا
            display_name: "Lite Ghost"
          - edition: pro-maxmini 
            iso_url: "https://github.com/takismartgamer123-rgb/Gamma-linux/releases/download/v2.3.0-FINAL/gamma-pro-maxmini.iso" # ضع الرابط الحقيقي هنا
            display_name: "Pro MaxMini"

    name: Capture ${{ matrix.display_name }} Edition
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 xvfb scrot fluxbox

      - name: Start Virtual Display
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          DISPLAY=:99 fluxbox & # مدير نوافذ خفيف جداً لمنع الشاشة السوداء
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Download ISO
        run: |
          echo "Downloading Gamma Linux ${{ matrix.display_name }}..."
          curl -fSL -o current_gamma.iso "${{ matrix.iso_url }}"
          ls -lh current_gamma.iso

      - name: Boot and Capture
        env:
          DISPLAY: :99
        run: |
          echo "Booting Gamma Linux ${{ matrix.display_name }}..."
          export NO_AT_BRIDGE=1
          export QT_ACCESSIBILITY=0
          
          # أضفنا خيار -fullscreen ليمسح الواجهة كاملة وتلتقطها scrot بنقاء
          if [ "${{ matrix.edition }}" = "legacy32" ]; then
            qemu-system-i386 -m 2G -cpu pentium3 -cdrom current_gamma.iso -vga std -fullscreen -audiodev none,id=snd0 -no-reboot &
          else
            qemu-system-x86_64 -m 2G -cpu max -cdrom current_gamma.iso -vga std -fullscreen -audiodev none,id=snd0 -no-reboot &
          fi
          
          # انتظر 85 ثانية لأن الإقلاع داخل المحاكي بدون KVM في السيرفر يأخذ وقت أطول
          echo "Waiting 85 seconds for Desktop stability..."
          sleep 85 

          # التقاط الشاشة بدقة 100%
          scrot -q 100 "gamma_${{ matrix.edition }}_boot.png"

      - name: Upload Screenshot for ${{ matrix.display_name }}
        uses: actions/upload-artifact@v4
        with:
          name: gamma-v2.3-${{ matrix.edition }}-screenshot
          path: gamma_${{ matrix.edition }}_boot.png
