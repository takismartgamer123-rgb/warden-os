name: Capture All Gamma Linux v2.3.0 Editions

on:
  workflow_dispatch: # يتيح لك التشغيل اليدوي بضغطة زر واحدة

jobs:
  screenshot-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # لو نسخة فشلت، الباقي يكمل
      matrix:
        edition: [legacy32, lite-ghost, pro-maxmini]
        include:
          - edition: legacy32 
            iso_url: "https://github.com/takismartgamer123-rgb/Gamma-linux/releases/download/v2.3.0-FINAL-legacy32/gamma-legacy-32.iso"
            display_name: "Legacy 32-bit"
          - edition: lite-ghost 
            iso_url: "https://github.com/takismartgamer123-rgb/Gamma-linux/releases/download/v2.3.0-FINAL-lite-ghost/gamma-lite-ghost.iso"
            display_name: "Lite Ghost"
          - edition: pro-maxmini 
            iso_url: "https://github.com/takismartgamer123-rgb/Gamma-linux/releases/download/v2.3.0-FINAL-pro-maxmini/gamma-pro-maxmini.iso"
            display_name: "Pro MaxMini"

    name: Capture ${{ matrix.display_name }} Edition
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 xvfb scrot

      - name: Start Virtual Display
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Download ISO
        run: |
          echo "Downloading Gamma Linux ${{ matrix.display_name }}..."
          # خيار -fSL يضمن تتبع الـ Redirects والتحميل الفعلي للملف بالكامل
          curl -fSL -o current_gamma.iso "${{ matrix.iso_url }}"
          
          # طباعة حجم الملف في الـ Logs للتأكد من اكتمال التحميل
          ls -lh current_gamma.iso

      - name: Boot and Capture
        env:
          DISPLAY: :99
        run: |
          echo "Booting Gamma Linux ${{ matrix.display_name }}..."
          
          # منع رسائل خطأ واجهة الـ GTK في البيئة السحابية
          export NO_AT_BRIDGE=1
          
          # تشغيل النسخة بالمحاكي المناسب وبدون بطاقة صوت حقيقية لتجنب أي تجميد
          if [ "${{ matrix.edition }}" = "legacy32" ]; then
            qemu-system-i386 -m 1G -cdrom current_gamma.iso -vga std -audiodev none,id=snd0 -device intel-hda -device hda-output,audiodev=snd0 -no-reboot &
          else
            qemu-system-x86_64 -m 1G -cdrom current_gamma.iso -vga std -audiodev none,id=snd0 -device intel-hda -device hda-output,audiodev=snd0 -no-reboot &
          fi
          
          # الانتظار لمدة 65 ثانية لضمان إقلاع الواجهة الرسومية واستقرارها تماماً
          sleep 65 

          # أخذ اللقطة وتسميتها باسم النسخة
          scrot -q 100 "gamma_${{ matrix.edition }}_boot.png"

      - name: Upload Screenshot for ${{ matrix.display_name }}
        uses: actions/upload-artifact@v4
        with:
          name: gamma-v2.3-${{ matrix.edition }}-screenshot
          path: gamma_${{ matrix.edition }}_boot.png
