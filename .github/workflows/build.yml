name: Build Gamma v2.3.0-FINAL ♾️🇩🇿
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version'
        required: true
        default: 'v2.3.0-FINAL'
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include:
          # ============= LEGACY-32 =============
          - edition: legacy-32
            arch: i386
            base: debian
            timeout: 150
            packages: "linux-image-686-pae lxqt-core lightdm calamares zram-tools tlp"
            zram: "150"
            swappiness: ""
            vfs: ""
            dirty: ""
            purge: ""
            hostname: "gamma-legacy"
            wallpaper: ""
            uefi: "ia32"
            label: "Gamma Legacy-32"
            release_suffix: "legacy32"
            body: |
              ## Gamma Legacy-32 ${{ github.event.inputs.version }} ♾️🇩🇿
              **For 512MB RAM PCs | Debian 12 i386**
              **LXQt 1.4 | ZRAM 150% | Calamares Installer**
              **BIOS + UEFI ia32 Hybrid Boot**

          # ============= LITE-GHOST =============
          - edition: lite-ghost
            arch: amd64
            base: bodhi
            timeout: 120
            packages: "lxqt-core lxqt-themes papirus-icon-theme materia-gtk-theme lightdm lightdm-gtk-greeter zram-tools tlp ubiquity ubiquity-frontend-gtk"
            zram: "50"
            swappiness: "100"
            vfs: "100"
            dirty: "10"
            purge: "moksha* e17* snapd* flatpak* cups* printer-driver* bluetooth* geoclue* evolution* gnome-software*"
            hostname: "gamma-lite"
            wallpaper: "true"
            uefi: "x64"
            label: "Gamma Lite-Ghost"
            release_suffix: "lite-ghost"
            body: |
              ## Gamma Lite-Ghost ${{ github.event.inputs.version }} ♾️🇩🇿
              **For 1GB RAM PCs | Bodhi 7 Base | Ubuntu | GHOST MODE**
              **LXQt 1.4 | ZRAM 50% | Aggressive Swapping | No Bloatware**
              **BIOS + UEFI x64 Hybrid Boot**

          # ============= PRO-MAXMINI =============
          - edition: pro-maxmini
            arch: amd64
            base: bodhi
            timeout: 120
            packages: "lxqt-core lxqt-themes papirus-icon-theme materia-gtk-theme lightdm lightdm-gtk-greeter zram-tools tlp ubiquity ubiquity-frontend-gtk"
            zram: "25"
            swappiness: ""
            vfs: ""
            dirty: ""
            purge: "moksha* e17* snapd* flatpak*"
            hostname: "gamma-pro"
            wallpaper: "true"
            uefi: "x64"
            label: "Gamma Pro-MaxMini"
            release_suffix: "pro-maxmini"
            body: |
              ## Gamma Pro-MaxMini ${{ github.event.inputs.version }} ♾️🇩🇿
              **For 2GB+ RAM PCs | Bodhi 7 Base | Ubuntu**
              **LXQt 1.4 | ZRAM 25% | TLP | Ubiquity Installer**
              **BIOS + UEFI x64 Hybrid Boot**

    steps:
    - uses: actions/checkout@v4

    - name: Optimize Disk
      if: matrix.arch == 'amd64'
      run: sudo rm -rf /usr/share/dotnet /opt/ghc "$AGENT_TOOLSDIRECTORY" && sudo apt-get clean && df -h

    - name: Install Tools
      run: |
        sudo apt-get update
        if [ "${{ matrix.arch }}" = "i386" ]; then
          sudo apt-get install -y debootstrap squashfs-tools xorriso wget isolinux syslinux-utils syslinux-common grub-pc-bin grub-efi-ia32-bin mtools dosfstools
        else
          sudo apt-get install -y squashfs-tools xorriso wget rsync zstd isolinux syslinux-utils syslinux-common shim-signed grub-efi-amd64-signed mtools dosfstools
        fi

    - name: Fetch Assets
      if: matrix.wallpaper == 'true'
      run: |
        wget -O gamma-wallpaper.jpg "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1920" || true
        wget -O gamma-logo.png "https://raw.githubusercontent.com/takismartgamer123-rgb/Gamma-linux/main/assets/logo.png" || true

    - name: Build ISO
      run: |
        if [ "${{ matrix.base }}" = "debian" ]; then
          sudo debootstrap --arch=i386 bookworm chroot http://deb.debian.org/debian/
          sudo mount --bind /dev chroot/dev && sudo mount --bind /run chroot/run
          sudo mount -t proc none chroot/proc && sudo mount -t sysfs none chroot/sys
        else
          wget -O base.iso "https://archive.org/download/bodhi-7.0.0-64/bodhi-7.0.0-64.iso"
          sudo mount -o loop base.iso base && sudo unsquashfs -f -d squashfs-root base/casper/filesystem.squashfs
          sudo rsync -a base/ ext/ --exclude=/casper/filesystem.squashfs
          sudo rsync -a --delete squashfs-root/ chroot/
        fi
        
        sudo chroot chroot apt-get update
        sudo chroot chroot apt-get remove -y --purge ${{ matrix.purge }} || true
        sudo chroot chroot apt-get install -y --no-install-recommends ${{ matrix.packages }}
        
        echo "ZRAM_SIZE_PERCENT=${{ matrix.zram }}" | sudo tee chroot/etc/default/zramswap
        if [ -n "${{ matrix.swappiness }}" ]; then
          echo "vm.swappiness=${{ matrix.swappiness }}" | sudo tee chroot/etc/sysctl.d/99-zram.conf
          echo "vm.vfs_cache_pressure=${{ matrix.vfs }}" | sudo tee -a chroot/etc/sysctl.d/99-zram.conf
          echo "vm.dirty_ratio=${{ matrix.dirty }}" | sudo tee -a chroot/etc/sysctl.d/99-zram.conf
        fi
        
        sudo chroot chroot systemctl disable NetworkManager-wait-online.service || true
        sudo chroot chroot bash -c "useradd -m -s /bin/bash gamma || true; echo 'gamma:gamma' | chpasswd; hostnamectl set-hostname ${{ matrix.hostname }}"
        
        if [ "${{ matrix.wallpaper }}" = "true" ]; then
          sudo mkdir -p chroot/usr/share/backgrounds && sudo cp gamma-wallpaper.jpg chroot/usr/share/backgrounds/gamma-wallpaper.jpg || true
        fi
        
        sudo umount chroot/dev chroot/run chroot/proc chroot/sys || true
        
        if [ "${{ matrix.base }}" = "debian" ]; then
          mkdir -p iso/live iso/boot/isolinux
          sudo mksquashfs chroot iso/live/filesystem.squashfs -comp zstd -Xcompression-level 15 -b 1M -noappend
          sudo cp chroot/boot/vmlinuz-* iso/live/vmlinuz
          sudo cp chroot/boot/initrd.img-* iso/live/initrd.img
          sudo cp /usr/lib/ISOLINUX/isolinux.bin iso/boot/isolinux/
          sudo cp /usr/lib/syslinux/modules/bios/*.c32 iso/boot/isolinux/
          echo "UI menu.c32
          PROMPT 0
          MENU TITLE ${{ matrix.label }} Boot
          TIMEOUT 50
          DEFAULT live
          LABEL live
          MENU LABEL ^Start ${{ matrix.label }} Live
          KERNEL /live/vmlinuz
          APPEND initrd=/live/initrd.img boot=live quiet splash" | sudo tee iso/boot/isolinux/isolinux.cfg
          dd if=/dev/zero of=iso/boot/efiboot.img bs=1M count=10
          mkfs.vfat iso/boot/efiboot.img
          mmd -i iso/boot/efiboot.img ::/EFI ::/EFI/BOOT
          mcopy -i iso/boot/efiboot.img /usr/lib/grub/i386-efi-signed/grubx64.efi.signed iso/boot/efiboot.img::/EFI/BOOT/BOOTIA32.EFI || true
          sudo xorriso -as mkisofs -iso-level 3 -r -V "GAMMA_${{ matrix.edition }}" -J -joliet-long -b boot/isolinux/isolinux.bin -c boot/isolinux/boot.cat -no-emul-boot -boot-load-size 4 -boot-info-table -eltorito-alt-boot -e boot/efiboot.img -no-emul-boot -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin -o "gamma-${{ matrix.edition }}.iso" iso/
        else
          sudo mksquashfs chroot ext/casper/filesystem.squashfs -comp zstd -Xcompression-level 15 -b 1M -noappend
          sudo cp /usr/lib/syslinux/modules/bios/*.c32 ext/boot/isolinux/
          cd ext
          dd if=/dev/zero of=boot/efiboot.img bs=1M count=10
          mkfs.vfat boot/efiboot.img
          mmd -i boot/efiboot.img ::/EFI ::/EFI/BOOT
          mcopy -i boot/efiboot.img /usr/lib/grub/x86_64-efi-signed/grubx64.efi.signed ::/EFI/BOOT/BOOTX64.EFI
          cd ..
          sudo xorriso -as mkisofs -iso-level 3 -r -V "GAMMA_${{ matrix.edition }}" -J -joliet-long -b boot/isolinux/isolinux.bin -c boot/isolinux/boot.cat -no-emul-boot -boot-load-size 4 -boot-info-table -eltorito-alt-boot -e boot/efiboot.img -no-emul-boot -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin -o "gamma-${{ matrix.edition }}.iso" ext/
        fi

    - uses: actions/upload-artifact@v4
      with:
        name: gamma-${{ matrix.edition }}
        path: gamma-${{ matrix.edition }}.iso

  release:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        edition: [legacy-32, lite-ghost, pro-maxmini]
        include:
          - edition: legacy-32
            suffix: legacy32
            body: |
              ## Gamma Legacy-32 ${{ github.event.inputs.version }} ♾️🇩🇿
              **For 512MB RAM PCs | Debian 12 i386**
              **LXQt 1.4 | ZRAM 150% | Calamares Installer**
              **BIOS + UEFI ia32 Hybrid Boot**
          - edition: lite-ghost
            suffix: lite-ghost
            body: |
              ## Gamma Lite-Ghost ${{ github.event.inputs.version }} ♾️🇩🇿
              **For 1GB RAM PCs | Bodhi 7 Base | Ubuntu | GHOST MODE**
              **LXQt 1.4 | ZRAM 50% | Aggressive Swapping | No Bloatware**
              **BIOS + UEFI x64 Hybrid Boot**
          - edition: pro-maxmini
            suffix: pro-maxmini
            body: |
              ## Gamma Pro-MaxMini ${{ github.event.inputs.version }} ♾️🇩🇿
              **For 2GB+ RAM PCs | Bodhi 7 Base | Ubuntu**
              **LXQt 1.4 | ZRAM 25% | TLP | Ubiquity Installer**
              **BIOS + UEFI x64 Hybrid Boot**
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: gamma-${{ matrix.edition }}
    - name: Generate SHA256
      run: sha256sum gamma-${{ matrix.edition }}.iso > SHA256SUMS.txt
    - uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.version }}-${{ matrix.suffix }}
        name: ${{ matrix.edition }} ${{ github.event.inputs.version }} ♾️🇩🇿
        body: |
          ${{ matrix.body }}
          ✅ **Verify with SHA256SUMS.txt**
          *Alpha failed. Beta crashed. Gamma survives*
          **By: Taki - 17 Years Old from Guelma, Algeria**
          **Dedicated to my father Fateh**
        files: |
          - gamma-${{ matrix.edition }}.iso
          - SHA256SUMS.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
