name: Build Gamma Store Pro - Standalone Edition

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Store Version'
        required: true
        default: '2.3.1'
      release_tag:
        description: 'Attach to release tag'
        required: true
        default: 'v2.1-Royal'

permissions:
  contents: write

jobs:
  build-store-pro:
    runs-on: ubuntu-22.04
    steps:
      - name: Create Gamma Store Pro .deb
        run: |
          PKG_NAME="gamma-store"
          PKG_VERSION="${{ github.event.inputs.version }}"
          ARCH="all"
          BUILD_DIR="${PKG_NAME}_${PKG_VERSION}_${ARCH}"
          
          mkdir -p "${BUILD_DIR}/DEBIAN"
          mkdir -p "${BUILD_DIR}/usr/local/bin"
          mkdir -p "${BUILD_DIR}/usr/share/applications"
          mkdir -p "${BUILD_DIR}/usr/share/gamma-store"
          
          cat > "${BUILD_DIR}/DEBIAN/control" << EOF
          Package: gamma-store
          Version: ${PKG_VERSION}
          Section: admin
          Priority: optional
          Architecture: all
          Depends: yad (>= 0.40), pkexec, apt, apt-utils, wget, curl, libnotify-bin, dpkg, jq
          Maintainer: Taki <takismartgamer123@gmail.com>
          Description: Gamma Store Pro - Standalone Smart App Center
           Universal software center with auto hardware detection, icon caching,
           filtered APT search, .deb installer, and self-updater.
           Works on any Ubuntu/Debian system.
           .
           Alpha failed. Beta crashed. Gamma survives.
           Dedicated to my father Fateh.
          EOF
          
          cat > "${BUILD_DIR}/usr/local/bin/gamma-store" << 'STORE_PRO'
          #!/bin/bash
          # Gamma Store Pro v2.3.1 - Standalone Edition
          # Alpha failed. Beta crashed. Gamma survives. Dedicated to my father Fateh
          
          ICON_CACHE="$HOME/.cache/gamma-store/icons"
          CONFIG_DIR="$HOME/.config/gamma-store"
          STORE_VERSION="2.3.1"
          GITHUB_REPO="takismartgamer123-rgb/Gamma-linux"
          mkdir -p "$ICON_CACHE" "$CONFIG_DIR"
          
          # 1. Detection أوتوماتيك حسب الهاردوير - منفصل عن الـ ISO
          detect_profile() {
              RAM_MB=$(free -m | awk '/^Mem:/{print $2}')
              ARCH=$(dpkg --print-architecture)
              
              if [ "$ARCH" = "i386" ] || [ $RAM_MB -lt 768 ]; then
                  echo "legacy"
              elif [ $RAM_MB -lt 2048 ]; then
                  echo "lite"
              else
                  echo "pro"
              fi
          }
          
          # نحفظ البروفايل باه مايحسبوش كل مرة
          if [ ! -f "$CONFIG_DIR/profile" ]; then
              detect_profile > "$CONFIG_DIR/profile"
          fi
          PROFILE=$(cat "$CONFIG_DIR/profile")
          
          get_icon() {
              local pkg="$1"
              local icon_path="$ICON_CACHE/${pkg}.png"
              [ -f "$icon_path" ] && echo "$icon_path" && return
              local sys_icon=$(dpkg -L "$pkg" 2>/dev/null | grep -m1 '/icons/.*\.png$\|pixmaps/.*\.png$' | head -1)
              if [ -n "$sys_icon" ] && [ -f "$sys_icon" ]; then cp "$sys_icon" "$icon_path"; echo "$icon_path" && return; fi
              wget -q -T 2 -O "$icon_path" "https://screenshots.debian.net/thumbnail/${pkg}" &
              echo "application-x-deb"
          }
          
          install_package() {
              local pkg="$1" name="$2"
              ( echo "# 10 Updating lists..."; pkexec apt-get update -qq
              echo "# 30 Installing $name..."; pkexec apt-get install -y "$pkg"
              echo "# 100 Done!") | yad --progress --title="Gamma Store" --text="<b>Installing $name</b>" \
              --percentage=0 --auto-close --width=500 --height=150 --no-buttons
              [ $? -eq 0 ] && notify-send "Gamma Store" "Installed $name successfully" -i software-install
          }
          
          install_deb() {
              local deb="$1"
              pkexec apt-get install -y "$deb" | yad --progress --pulsate --auto-close \
              --title="Installing .deb" --text="Installing $(basename "$deb")..." --no-buttons
          }
          
          # 2. البحث يجيب غير التطبيقات الحقيقية + فلترة حسب البروفايل
          search_packages() {
              local query="$1"
              (echo "# Searching apps..."; sleep 1) | yad --progress --pulsate --auto-close --no-buttons --width=300 &
              
              RESULTS=$(apt-cache search "$query" | while read pkg desc; do
                  # لازم يكون تطبيق GUI حقيقي
                  if apt-cache show "$pkg" 2>/dev/null | grep -q "Section: " && \
                     dpkg -L "$pkg" 2>/dev/null | grep -q '/usr/share/applications/.*\.desktop'; then
                      
                      # فلترة حسب البروفايل - Legacy مايشوفش التطبيقات الثقيلة
                      if [ "$PROFILE" = "legacy" ]; then
                          # نحي التطبيقات الثقيلة
                          [[ "$pkg" =~ chromium|libreoffice|gimp|kdenlive|blender ]] && continue
                      fi
                      echo "$pkg $desc"
                  fi
              done | grep -v "^lib" | head -25)
              
              killall yad 2>/dev/null
              [ -z "$RESULTS" ] && yad --error --text="No apps found for: <b>$query</b>\n\nTry a different search." --width=350 && return
              
              FORMATTED=""
              while IFS= read -r line; do
                  PKG=$(echo "$line" | cut -d' ' -f1)
                  DESC=$(echo "$line" | cut -d' ' -f2- | cut -c1-65)
                  ICON=$(get_icon "$PKG")
                  INSTALLED=$(dpkg -l 2>/dev/null | grep -q "^ii  $PKG " && echo "TRUE" || echo "FALSE")
                  FORMATTED="$FORMATTED\n$INSTALLED|$ICON|$PKG|$DESC"
              done <<< "$RESULTS"
              
              SELECTED=$(echo -e "$FORMATTED" | yad --list --checklist --title="Search: $query - $PROFILE mode" \
              --text="<b>Showing apps compatible with your system</b>" \
              --column="Installed" --column:IMG="Icon" --column="Package" --column="Description" \
              --width=950 --height=600 --separator=" " --print-column=3 \
              --button="Back:1" --button="Install:0")
              
              [ $? -eq 0 ] && [ -n "$SELECTED" ] && for pkg in $SELECTED; do install_package "$pkg" "$pkg"; done
          }
          
          # 3. Featured حسب البروفايل المكتشف أوتوماتيك
          show_featured() {
              FEATURED_FILE="/usr/share/gamma-store/featured-${PROFILE}.list"
              
              LIST=$(cat "$FEATURED_FILE" | while IFS='|' read name desc cat; do
                  ICON=$(get_icon "$name")
                  INSTALLED=$(dpkg -l 2>/dev/null | grep -q "^ii  $name " && echo "TRUE" || echo "FALSE")
                  echo "$INSTALLED|$ICON|$name|$desc|$cat"
              done)
              
              SELECTED=$(echo -e "$LIST" | yad --list --checklist --title="Featured Apps - $PROFILE Mode" \
              --text="<b>Apps optimized for your hardware</b>\nDetected: $PROFILE profile | RAM: $(free -h | awk '/^Mem:/{print $2}')" \
              --column="Installed" --column:IMG="Icon" --column="App" --column="Description" --column="Category" \
              --width=900 --height=600 --separator=" " --print-column=3 \
              --button="Back:1" --button="Install Selected:0")
              
              [ $? -eq 0 ] && [ -n "$SELECTED" ] && for app in $SELECTED; do install_package "$app" "$app"; done
          }
          
          show_categories() {
              CAT=$(yad --list --title="Categories - $PROFILE Mode" --text="<b>Browse by category</b>" \
              --column="Category" --column="Description" \
              "internet" "Web Browsers, Email, Torrents" \
              "multimedia" "Video Players, Music, Audio" \
              "office" "Word Processor, Spreadsheet, PDF" \
              "graphics" "Image Editors, Viewers" \
              "utilities" "System Tools, Archives" \
              "development" "Code Editors, IDEs" \
              --width=550 --height=450 --print-column=1 --button="Back:1" --button="Open:0")
              
              [ $? -ne 0 ] || [ -z "$CAT" ] && return
              search_packages "$CAT"
          }
          
          # 4. تحديث الستور نفسو
          check_store_updates() {
              (echo "# Checking GitHub..."; sleep 1) | yad --progress --pulsate --auto-close --no-buttons --width=300 &
              
              LATEST_TAG=$(curl -s "https://api.github.com/repos/$GITHUB_REPO/releases/latest" | jq -r .tag_name)
              killall yad 2>/dev/null
              
              if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
                  yad --error --text="Cannot check updates. Check internet." --width=350
                  return
              fi
              
              LATEST_DEB=$(curl -s "https://api.github.com/repos/$GITHUB_REPO/releases/tags/$LATEST_TAG" | \
                           jq -r '.assets[] | select(.name | test("gamma-store_.*_all.deb")) | .browser_download_url' | head -1)
              
              if [ -z "$LATEST_DEB" ] || [ "$LATEST_DEB" = "null" ]; then
                  yad --info --text="<b>Gamma Store Pro v$STORE_VERSION</b>\n\nYou have the latest version!\nProfile: $PROFILE\n\n<i>Alpha failed. Beta crashed. Gamma survives.</i>" --width=400
                  return
              fi
              
              yad --question --title="Update Available" \
              --text="<b>New Gamma Store version available!</b>\n\nCurrent: v$STORE_VERSION\nLatest: $LATEST_TAG\n\nUpdate now?" \
              --width=450
              
              if [ $? -eq 0 ]; then
                  TEMP_DEB="/tmp/gamma-store-update.deb"
                  wget -O "$TEMP_DEB" "$LATEST_DEB" | yad --progress --pulsate --auto-close --title="Downloading..." --text="Downloading update..." --no-buttons
                  pkexec apt-get install -y "$TEMP_DEB"
                  yad --info --text="<b>Updated!</b>\n\nRestart Gamma Store to use new version." --width=350
                  rm -f "$TEMP_DEB"
              fi
          }
          
          change_profile() {
              NEW=$(yad --list --title="Change Profile" --text="<b>Manually select hardware profile</b>\n\nCurrent: $PROFILE" \
              --column="Profile" --column="For" \
              "legacy" "512MB-768MB RAM, 32-bit" \
              "lite" "1GB-2GB RAM" \
              "pro" "2GB+ RAM, Full apps" \
              --width=450 --height=300 --print-column=1 --button="Cancel:1" --button="Save:0")
              
              [ $? -eq 0 ] && [ -n "$NEW" ] && echo "$NEW" > "$CONFIG_DIR/profile" && PROFILE="$NEW" && \
              yad --info --text="Profile changed to: $NEW\n\nRestart Gamma Store to apply." --width=350
          }
          
          while true; do
              RAM_H=$(free -h | awk '/^Mem:/{print $2}')
              ACTION=$(yad --form --title="Gamma Store Pro v$STORE_VERSION" \
              --text="<b><big>Gamma Store Pro - Standalone</big></b>\n<i>Profile: $PROFILE | RAM: $RAM_H | Icons cache forever</i>\n\n<b>Alpha failed. Beta crashed. Gamma survives</b>\n<i>Dedicated to my father Fateh</i>" \
              --image="software-store" --image-on-top \
              --field="Featured Apps:FBTN" "bash -c 'echo featured'" \
              --field="Categories:FBTN" "bash -c 'echo categories'" \
              --field="Search All Apps:FBTN" "bash -c 'echo search'" \
              --field="Install .deb File:FBTN" "bash -c 'echo deb'" \
              --field="Check for Updates:FBTN" "bash -c 'echo update'" \
              --field="Change Profile:FBTN" "bash -c 'echo profile'" \
              --field="Clear Icon Cache:FBTN" "bash -c 'echo clear'" \
              --button="Exit:1" --button="About:2" \
              --width=700 --height=650 --center --window-icon="software-store")
              
              EXIT_CODE=$?
              [ $EXIT_CODE -eq 1 ] && exit 0
              [ $EXIT_CODE -eq 2 ] && yad --info --title="About" \
              --text="<b>Gamma Store Pro v$STORE_VERSION - Standalone</b>\n\nProfile: $PROFILE\nRAM: $RAM_H\nBy: Taki - 17yo from Guelma\n\n<b>Features:</b>\n• Auto hardware detection\n• Smart icon cache\n• Real apps only in search\n• Self-updater\n• Profile switcher\n\n<i>Works on any Ubuntu/Debian</i>\n\n<b>Dedicated to my father Fateh</b>" --width=550 && continue
              
              CHOICE=$(echo $ACTION | cut -d'|' -f1)
              case "$CHOICE" in
                  *featured*) show_featured ;;
                  *categories*) show_categories ;;
                  *search*) QUERY=$(yad --entry --title="Search Apps" --text="<b>Search real apps only:</b>" --entry-text="" --width=500)
                            [ -n "$QUERY" ] && search_packages "$QUERY" ;;
                  *deb*) DEB_FILE=$(yad --file --file-filter="Debian Packages | *.deb" --width=600 --height=500)
                         [ -n "$DEB_FILE" ] && install_deb "$DEB_FILE" ;;
                  *update*) check_store_updates ;;
                  *profile*) change_profile ;;
                  *clear*) SIZE=$(du -sh "$ICON_CACHE" 2>/dev/null | cut -f1)
                           rm -rf "$ICON_CACHE"; mkdir -p "$ICON_CACHE"
                           yad --info --text="Cache cleared!\nFreed: ${SIZE:-0B}" --width=300 ;;
              esac
          done
          STORE_PRO
          chmod +x "${BUILD_DIR}/usr/local/bin/gamma-store"
          
          # Featured lists حسب البروفايل
          cat > "${BUILD_DIR}/usr/share/gamma-store/featured-legacy.list" << 'EOF'
          dillo|1MB Web Browser|Ultra light browser for old PCs|internet
          xmms|Music Player|Winamp 2 clone, 4MB RAM|multimedia
          abiword|Word Processor|MS Word files, 20MB RAM|office
          mtpaint|Image Editor|MS Paint alternative|graphics
          leafpad|Text Editor|Instant notepad|accessories
          xarchiver|Archive Manager|Extract zip/rar|utilities
          EOF
          
          cat > "${BUILD_DIR}/usr/share/gamma-store/featured-lite.list" << 'EOF'
          firefox-esr|Web Browser|Modern web, still light|internet
          vlc|Media Player|Plays everything|multimedia
          audacious|Music Player|Winamp-style|multimedia
          libreoffice-writer|Office|Word documents|office
          gimp|Image Editor|Photoshop alternative|graphics
          transmission|Torrents|Download torrents 15MB|internet
          gnumeric|Spreadsheet|Excel alternative|office
          EOF
          
          cat > "${BUILD_DIR}/usr/share/gamma-store/featured-pro.list" << 'EOF'
          chromium|Web Browser|Full Chrome experience|internet
          vlc|Media Player|Hardware accelerated|multimedia
          libreoffice|Office Suite|Full Office replacement|office
          gimp|Image Editor|Full features|graphics
          kdenlive|Video Editor|Video editing|multimedia
          inkscape|Vector Graphics|Illustrator alternative|graphics
          code|Code Editor|VS Code for Linux|development
          obs-studio|Screen Recorder|Record/stream|multimedia
          EOF
          
          cat > "${BUILD_DIR}/usr/share/applications/gamma-store.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Gamma Store Pro
          GenericName=App Center
          Comment=Standalone Smart App Center with Auto Hardware Detection
          Exec=gamma-store
          Icon=system-software-install
          Terminal=false
          Categories=System;PackageManager;Settings;
          Keywords=store;apps;install;software;search;update;
          StartupNotify=true
          EOF
          
          dpkg-deb --build "${BUILD_DIR}"
          ls -lh "${PKG_NAME}_${PKG_VERSION}_${ARCH}.deb"
          
      - name: Upload to Release ${{ github.event.inputs.release_tag }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: gamma-store_${{ github.event.inputs.version }}_all.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
