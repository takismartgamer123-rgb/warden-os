name: Build and Upload Gamma Store Royal
on: 
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev fakeroot

      - name: Create gamma-store.sh
        run: |
          cat > gamma-store.sh <<'EOF'
          #!/bin/bash
          # Gamma Store Pro v4.1 - Royal Market Fixed Edition
          # By Taki - 17yo from Guelma | Dedicated to Fateh ♾️
          export GTK_THEME=Adwaita:dark
          CSS="* { background-color: #000; color: #ffffff; font-family: 'Ubuntu', sans-serif; } view, treeview, text { background-color: #0d0d0d; color: #e0e0e0; border: 1px solid #222; border-radius: 8px; } entry { background-color: #1a1a1a; color: #fff; border: 1px solid #00c853; border-radius: 20px; padding: 10px; font-size: 14px; } button { background-color: #00c853; color: #000; font-weight: bold; border-radius: 25px; padding: 8px; } button:hover { background-color: #00e676; } notebook tab { background-color: #0a0a0a; color: #888; } notebook tab:checked { background-color: #000; color: #00c853; font-weight: bold; }"
          KEY=$RANDOM PIPE_SEARCH=$(mktemp -u)
          mkfifo "$PIPE_SEARCH"
          exec 3<> "$PIPE_SEARCH"
          search_packages() { local query="$1"; if [ -z "$query" ] || [ ${#query} -lt 3 ]; then echo -e "firefox-esr\nSafe and optimized modern web browser\nvlc\nUltimate open-source multimedia player\nlibreoffice\nComplete productive office suite\ngimp\nProfessional image manipulation program" >&3; else apt-cache search "$query" | head -n 15 | awk '{print $1; $1=""; print substr($0,2)}' >&3; fi }
          sudo apt-get update -qq &
          search_packages ""
          while read -r line; do
            if [[ "$line" == "SEARCH:"* ]]; then
              local_query="${line#SEARCH:}"
              search_packages "$local_query"
            elif [[ "$line" == "INSTALL:"* ]]; then
              pkg="${line#INSTALL:}"
              if [ ! -z "$pkg" ]; then
                yad --title="Gamma Installer" --text="Downloading and installing $pkg from official repositories..." --progress --pulsate --auto-close --width=350 --center & Y_PID=$!
                pkexec apt-get install -y "$pkg" --no-update
                kill $Y_PID 2>/dev/null
                yad --info --title="Done" --text="👑 $pkg has been successfully installed!" --button="Awesome:0" --center
              fi
            fi
          done ) <(yad --paned --key=$KEY --orient=horizontal --split=30 --title="Gamma Store Pro v4.1 - Royal Market" --width=850 --height=550 --center --css="$CSS" & yad --plug=$KEY --tabnum=1 --form --columns=1 --text="<span foreground='#00c853' size='large'><b>👑 Gamma Market</b></span>" --field="🔍 Search Apps (Apt Repo):ENTRY" "" --field="💡 Tip: Type app name and hit Enter to search directly from official Debian/Ubuntu mirrors!:LBL" --button="Search:2" --button="Exit:1" >&3 & yad --plug=$KEY --tabnum=2 --list --column="📦 Package Name" --column="📝 Application Description" --listen <&3 --button="Install Selected Application:0" --center) )
          rm -f "$PIPE_SEARCH"
          EOF
          chmod +x gamma-store.sh

      - name: Build DEB v2.2-Royal
        run: |
          VER="2.2-Royal"
          mkdir -p gamma-store-pro_$VER/DEBIAN
          mkdir -p gamma-store-pro_$VER/usr/bin
          mkdir -p gamma-store-pro_$VER/usr/share/applications
          mkdir -p gamma-store-pro_$VER/usr/share/pixmaps
          cp gamma-store.sh gamma-store-pro_$VER/usr/bin/gamma-store
          if [ -f "assets/logo.png" ]; then cp assets/logo.png gamma-store-pro_$VER/usr/share/pixmaps/logo.png; else touch gamma-store-pro_$VER/usr/share/pixmaps/logo.png; fi
          cat > gamma-store-pro_$VER/usr/share/applications/gamma-store.desktop <<EOF
          [Desktop Entry]
          Name=Gamma Store Pro Royal
          Exec=gamma-store
          Icon=logo
          Type=Application
          Categories=Utility;
          EOF
          echo "Package: gamma-store-pro
          Version: 2.2-Royal
          Architecture: all
          Depends: yad, apt, policykit-1
          Maintainer: Taki
          Description: Gamma Store Pro v4.1 Dark Play Store Edition
           Fetches packages live from official Debian/Ubuntu repositories.
           Special Dedication to Fateh ∞" > gamma-store-pro_$VER/DEBIAN/control
          dpkg-deb --build gamma-store-pro_$VER
          mv gamma-store-pro_$VER.deb gamma-store-pro_2.2-Royal_all.deb

      - name: Create New Release + Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.2-Royal-${{ github.run_number }}
          name: Gamma Store Pro v2.2-Royal Build ${{ github.run_number }} 👑
          body: |
            ## 👑 Gamma Store Pro v4.1 - Royal Market
            **Dark Play Store Edition for Gamma Linux**
            
            ### 🔥 What's New in Build ${{ github.run_number }}
            - `pkexec` instead of `sudo` = No more hang
            - `policykit-1` added to DEB dependencies 
            - Bash `Syntax Error` on line 40 = Fixed ✅
            - Live search from official Debian/Ubuntu mirrors
            
            ### 📦 Installation
            ```bash
            sudo dpkg -i gamma-store-pro_2.2-Royal_all.deb
            sudo apt-get install -f
            gamma-store
            ### ♾️ Credits
            *By: Taki - 17 Years Old from Guelma, Algeria*  
            *Dedicated to my father Fateh*  
            *Alpha failed. Beta crashed. Gamma SURVIVES* 🇩🇿
          files: gamma-store-pro_2.2-Royal_all.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
