name: Gamma Store Demo - FAIL IF BLANK 🎥♾️
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'التاق تاع الريليز'
        required: true
        default: 'v2.1-Royal'

permissions:
  contents: write

jobs:
  record-store:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg x11-utils xterm xdotool \
            fonts-noto-color-emoji wget imagemagick
          
      - name: Record Store Demo
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 5
          
          # بلا fluxbox بلا openbox - هوما سبب المشاكل
          
          # افتح xterm ديركت على شاشة سودة
          xterm -geometry 120x35+50+50 -fa 'Monospace' -fs 16 -bg "#0a0a0a" -fg "#00ff88" &
          sleep 8
          
          # فحص صارم: لازم xterm يبان ولا نحبسو
          if ! xdotool search --name "xterm" >/dev/null 2>&1; then
            echo "ERROR: xterm not found. Screen is blank"
            import -window root /tmp/debug.png
            echo "Debug screenshot size: $(stat -c%s /tmp/debug.png) bytes"
            exit 1
          fi
          
          # فحص ثاني: حجم السكرينشوت
          import -window root /tmp/check.png
          SIZE=$(stat -c%s /tmp/check.png)
          echo "Screenshot size: $SIZE bytes"
          if [ $SIZE -lt 100000 ]; then
            echo "ERROR: Screen is blank or too small: $SIZE bytes"
            echo "Expected >100KB with xterm visible"
            exit 1
          fi
          
          echo "Screen OK. Starting record..."
          
          # ضرك سجل - مضمون كاين xterm
          ffmpeg -f x11grab -video_size 1280x720 -framerate 25 -i :99 \
            -c:v libx264 -preset ultrafast -pix_fmt yuv420p -t 75 gamma-store.mp4 &
          FFMPEG_PID=$!
          sleep 3
          
          # focus واكتب
          xdotool search --name "xterm" windowactivate
          sleep 1
          
          xdotool type "clear"
          xdotool key Return
          sleep 1
          xdotool type "echo '=== Gamma Store Pro v2.2 ==='"
          xdotool key Return
          sleep 1
          xdotool type "echo 'Dedicated to my father Fateh ♾️'"
          xdotool key Return
          sleep 2
          
          xdotool type "wget https://github.com/takismartgamer123-rgb/Gamma-linux/releases/download/${{ github.event.inputs.release_tag }}/gamma-store_2.2.0_all.deb"
          xdotool key Return
          sleep 15
          
          xdotool type "sudo apt-get install -y ./gamma-store_2.2.0_all.deb"
          xdotool key Return
          sleep 25
          
          xdotool type "clear && echo 'Launching Gamma Store...' && echo '' && gamma-store"
          xdotool key Return
          sleep 20
          
          xdotool type "echo '' && echo 'Alpha failed. Beta crashed. Gamma survives ♾️'"
          xdotool key Return
          sleep 5
          
          kill $FFMPEG_PID
          sleep 3
          
          # فحص أخير للفيديو
          ls -lh gamma-store.mp4
          FILESIZE=$(stat -c%s gamma-store.mp4)
          if [ $FILESIZE -lt 100000 ]; then
            echo "ERROR: Video file too small: $FILESIZE bytes"
            exit 1
          fi
          
      - name: Upload to Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: gamma-store.mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
